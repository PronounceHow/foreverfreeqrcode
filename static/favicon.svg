<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0ea5e9"/>

  <!-- Top-left finder pattern -->
  <rect x="3" y="3" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="5" y="5" width="6" height="6" rx="0.5" fill="#0ea5e9"/>
  <rect x="6" y="6" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Top-right finder pattern -->
  <rect x="19" y="3" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="21" y="5" width="6" height="6" rx="0.5" fill="#0ea5e9"/>
  <rect x="22" y="6" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Bottom-left finder pattern -->
  <rect x="3" y="19" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="5" y="21" width="6" height="6" rx="0.5" fill="#0ea5e9"/>
  <rect x="6" y="22" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Data modules (bottom-right area) -->
  <rect x="19" y="19" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="23" y="19" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="27" y="19" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="19" y="23" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="23" y="23" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="27" y="23" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="19" y="27" width="3" height="2" rx="0.5" fill="white"/>
  <rect x="25" y="27" width="4" height="2" rx="0.5" fill="white"/>

  <!-- Timing / alignment dots -->
  <rect x="15" y="6"  width="2" height="2" rx="0.5" fill="white"/>
  <rect x="15" y="10" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="6"  y="15" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="10" y="15" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="15" y="15" width="2" height="2" rx="0.5" fill="white"/>
</svg>
